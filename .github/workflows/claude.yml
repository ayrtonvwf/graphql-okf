name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

# Identical across both jobs; keep in sync if the toolchain changes.
env:
  CLAUDE_ALLOWED_TOOLS: >-
    Bash(pnpm install:*),
    Bash(pnpm run format:*),
    Bash(pnpm run lint:*),
    Bash(pnpm run typecheck:*),
    Bash(pnpm run build:*),
    Bash(pnpm run coverage:*),
    Bash(pnpm run test:*),
    Bash(pnpm test:*),
    Bash(biome:*),
    Bash(lefthook:*),
    Bash(mkdir:*),
    Bash(mv:*),
    Bash(gh pr create:*),
    Bash(gh pr view:*),
    Bash(gh pr edit:*),
    Bash(gh pr comment:*),
    Bash(gh pr diff:*),
    Bash(gh pr checks:*)

jobs:
  claude:
    name: claude (sonnet)
    runs-on: ubuntu-latest
    if: |
      github.actor == github.repository_owner &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-opus')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-opus')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '@claude-opus')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && !(contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus')))
      )
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: "--model claude-sonnet-5 --allowedTools \"${{ env.CLAUDE_ALLOWED_TOOLS }}\""

      - name: Format backstop
        if: github.ref != 'refs/heads/main'
        run: |
          pnpm run format
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: format backstop [claude[bot]]"
            git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:"${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          fi
        env:
          PUSH_TOKEN: ${{ secrets.CLAUDE_PUSH_TOKEN }}

  claude-opus:
    name: claude (opus)
    runs-on: ubuntu-latest
    if: |
      github.actor == github.repository_owner &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-opus')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-opus')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-opus')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus')))
      )
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude-opus"
          claude_args: "--model claude-opus-4-8 --allowedTools \"${{ env.CLAUDE_ALLOWED_TOOLS }}\""

      - name: Format backstop
        if: github.ref != 'refs/heads/main'
        run: |
          pnpm run format
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: format backstop [claude[bot]]"
            git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:"${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          fi
        env:
          PUSH_TOKEN: ${{ secrets.CLAUDE_PUSH_TOKEN }}
